<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#11161d" />
    <meta name="description" content="OpenClaw Cloud Agent with local bridge, Ollama routing, and Gemini fallback." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>OpenClaw Control Surface</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="rail rail-left">
        <div class="brand">
          <div class="brand-mark">OC</div>
          <div class="brand-copy">
            <p class="eyebrow">Cloudflare Worker</p>
            <h1>OpenClaw Control Surface</h1>
            <p id="provider-line">Checking runtime</p>
          </div>
        </div>

        <section class="section">
          <div class="section-head">
            <h2>Runtime</h2>
            <span id="status-pill" class="pill neutral">Booting</span>
          </div>
          <div id="runtime-cards" class="card-list"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>Providers</h2>
          </div>
          <div id="providers" class="stack-list"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>Skills</h2>
          </div>
          <div id="skills" class="stack-list"></div>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar-copy">
            <p class="eyebrow">Local bridge, remote fallback, durable sessions</p>
            <p id="subtitle" class="subtitle">Waiting for health data</p>
          </div>

          <div class="topbar-actions">
            <button id="install-app" class="action-button secondary" type="button" hidden>
              <span class="button-icon" aria-hidden="true">+</span>
              <span>Install</span>
            </button>
            <button id="refresh-health" class="action-button secondary" type="button">
              <span class="button-icon" aria-hidden="true">&#8635;</span>
              <span>Refresh</span>
            </button>
            <button id="ensure-runtime" class="action-button primary" type="button">
              <span class="button-icon" aria-hidden="true">&#9881;</span>
              <span>Recover Runtime</span>
            </button>
          </div>
        </header>

        <section class="chat-shell">
          <div class="composer-settings">
            <label>
              <span>Session</span>
              <input id="session-id" value="main" maxlength="96" />
            </label>
            <label>
              <span>Model</span>
              <input id="model" value="qwen3.5:9b" />
            </label>
            <label class="checkbox">
              <input id="auto-tools" type="checkbox" />
              <span>Auto tools</span>
            </label>
          </div>

          <div id="messages" class="messages" aria-live="polite"></div>

          <form id="composer" class="composer">
            <div class="textarea-wrap">
              <textarea id="prompt" rows="1" placeholder="Message the agent"></textarea>
            </div>
            <button id="send" class="send-button" type="submit" aria-label="Send">
              <span aria-hidden="true">&#10148;</span>
            </button>
          </form>
        </section>
      </main>

      <aside class="rail rail-right">
        <section class="section">
          <div class="section-head">
            <h2>Activity</h2>
          </div>
          <div id="activity" class="stack-list"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>Runtime Details</h2>
          </div>
          <dl id="runtime-meta" class="meta-list"></dl>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>Latest Payload</h2>
          </div>
          <details class="payload-view" open>
            <summary>Response JSON</summary>
            <pre id="raw-log">{}</pre>
          </details>
        </section>
      </aside>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
