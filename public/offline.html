<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#11161d" />
    <title>OpenClaw Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: #11161d;
        --line: #253041;
        --text: #edf3fb;
        --muted: #97a5b8;
        --accent: #36cfc9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
        padding: 24px;
      }

      main {
        width: min(460px, 100%);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      p {
        color: var(--muted);
      }

      strong {
        color: var(--accent);
        display: block;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>OpenClaw Control Surface</strong>
      <h1>Offline</h1>
      <p>The PWA shell is available, but the runtime endpoints are unreachable right now. Reconnect and refresh to restore chat, bridge health, and recovery controls.</p>
    </main>
  </body>
</html>
